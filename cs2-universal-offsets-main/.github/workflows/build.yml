name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # NOTE: do NOT set `RUSTFLAGS: -D warnings` here. The dumper still
  # carries some legacy unused-code from the source2 tier1 port that
  # we keep around as a reference; promoting warnings to errors kills
  # the build and blocks the release job from running.

jobs:
  windows:
    name: build (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: cargo clippy
        run: cargo clippy --release --all-targets -- -D warnings
        continue-on-error: true

      - name: cargo build --release
        run: cargo build --release

      - name: upload binary
        uses: actions/upload-artifact@v4
        with:
          name: cs2-sdk-windows
          path: target/release/cs2-sdk.exe
          if-no-files-found: error

  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cs2-sdk-windows
          path: dist

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/cs2-sdk.exe
          draft: false
          prerelease: false
          generate_release_notes: true
